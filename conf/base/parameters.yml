training:
  data_dir: data/raw
  file_name: Books_10k.jsonl
  model_name_or_path: distilbert-base-uncased
  output_dir: outputs/hf_model
  text_column: review_text
  label_column: sentiment
  test_size: 0.1
  training_args:
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 8
    num_train_epochs: 1
    eval_strategy: epoch
    save_strategy: epoch
    logging_steps: 50
    load_best_model_at_end: true
    metric_for_best_model: f1_macro

input_data:
  data_dir: data/raw
  file_name: Books_10k.jsonl
