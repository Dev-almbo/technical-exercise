exclude: '(^|/)(\\.venv|data)/|\\.ipynb$'
repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version
  rev: v0.14.3
  hooks:
    - id: ruff
      args: ["--fix", "--line-length", "88"]
    - id: ruff-format
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.9.7
  hooks:
    - id: uv-lock
- repo: https://github.com/executablebooks/mdformat
  rev: 1.0.0
  hooks:
    - id: mdformat
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: check-json
    - id: check-yaml
    - id: debug-statements
    - id: detect-private-key
    - id: check-added-large-files
      args: ["--maxkb=1000"]
    - id: end-of-file-fixer
    - id: trailing-whitespace
- repo: local
  hooks:
    - id: ty
      name: ty
      entry: "uv run --frozen ty check"
      language: system
      # Only match Python files and let pre-commit pass filenames to the hook.
      files: "\\.py$"
      pass_filenames: true
      # Exclude notebooks, data folders and virtualenvs explicitly
      exclude: '(^|/)(\\.venv|data)/|\\.ipynb$'
- repo: https://github.com/kynan/nbstripout
  rev: 0.9.1
  hooks:
    - id: nbstripout
